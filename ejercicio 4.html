<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración Unidad Administrativa</title>
    <link rel="stylesheet" href="styles4.css">
</head>
<body>

<div class="container">

    <div class="header-top">SISTEMA DE ACTIVOS FIJOS</div>

    <div class="sub-header">Unidad Administrativa</div>

    <div class="header-main">ADMINISTRACION UNIDAD ADMINISTRATIVA</div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>UNIDAD</th>
                    <th>DESCRIPCION</th>
                    <th>CIUDAD</th>
                </tr>
            </thead>
            <tbody>
                <tr class="selected">
                    <td>025</td>
                    <td>GACETA OFICIAL DE BOLIVIA</td>
                    <td>LA PAZ</td>
                </tr>
                <tr><td>&nbsp;</td><td></td><td></td></tr>
                <tr><td>&nbsp;</td><td></td><td></td></tr>
                <tr><td>&nbsp;</td><td></td><td></td></tr>
                <tr><td>&nbsp;</td><td></td><td></td></tr>
                <tr><td>&nbsp;</td><td></td><td></td></tr>
            </tbody>
        </table>
    </div>

    <div class="buttons">
        <button class="btn">Nuevo</button>
        <button class="btn">Editar</button>
        <button class="btn">Eliminar</button>
        <button class="btn">Seleccionar</button>
        <button class="btn">Salir</button>
    </div>

</div>

<script>
    const rows = document.querySelectorAll("tbody tr");

    rows.forEach(row => {
        row.addEventListener("click", () => {
            rows.forEach(r => r.classList.remove("selected"));
            row.classList.add("selected");
        });
    });
</script>

</body>
</html>
